# ╔═══════════════════════════════════════════════════════════════════════╗
# ║                    AeroSpace — Fase 1: Navegación                    ║
# ║                                                                      ║
# ║  Modificadores:                                                      ║
# ║    Hyper (cmd-ctrl-alt-shift) → Navegación (ir a workspace, foco)    ║
# ║    Meh   (ctrl-alt-shift)     → Acción (mover ventana)               ║
# ║                                                                      ║
# ║  Workspaces por LETRAS (mano derecha, sin fila numérica)             ║
# ║  Hyper = pulgar derecho | Letra = mano derecha                       ║
# ╚═══════════════════════════════════════════════════════════════════════╝

config-version = 2
start-at-login = true

# ─── Normalización ─────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─── Layout por defecto ────────────────────────────────────────────────
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ─── Mouse sigue al foco cuando cambiás de monitor ────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ─── Integración Sketchybar ──────────────────────────────────────────
# Notifica a Sketchybar cuando cambiás de workspace para actualizar la barra.
exec-on-workspace-change = ['/bin/bash', '-c',
    '$HOME/mydotfiles/aerospace/scripts/update_sketchybar_workspace.sh'
]

# ─── Workspaces persistentes (por letra, mnemotécnicos) ──────────────
# U = Uno (principal, IDE/editor)
# I = Internet (Chrome, browsers)
# O = Obsidian (notas, estudio)
# P = Personal (Telegram, Discord, chat)
# Y = YouTube/música (Spotify, media)
# N = Navegador de archivos (Finder, sistema)
persistent-workspaces = ["U", "I", "O", "P", "Y", "N"]

# ─── Gaps ─────────────────────────────────────────────────────────────
[gaps]
    inner.horizontal = 0
    inner.vertical   = 0
    outer.left       = 6
    outer.bottom     = 6
    outer.right      = 6
    outer.top        = 42  # Espacio para Sketchybar (~36px barra + 6px gap)

# ─── Teclado QWERTY ─────────────────────────────────────────────────
[key-mapping]
    preset = 'qwerty'

# ═════════════════════════════════════════════════════════════════════
# ATAJOS — Modo Principal (main)
# ═════════════════════════════════════════════════════════════════════
#
# LÓGICA:
#   Hyper + letra → IR al workspace (navegación)
#   Meh + letra   → MOVER ventana al workspace (acción)
#
# Todas las letras de workspace están en la MANO DERECHA:
#   Y  U  I  O  P      ← fila superior (cómoda, no es la numérica)
#            N          ← fila inferior
#
# ═════════════════════════════════════════════════════════════════════
[mode.main.binding]

    # ─── WORKSPACE: Ir (Hyper + letra) ───────────────────────────────
    cmd-alt-ctrl-shift-u = 'workspace U'       # Uno (principal)
    cmd-alt-ctrl-shift-i = 'workspace I'       # Internet
    cmd-alt-ctrl-shift-o = 'workspace O'       # Obsidian/notas
    cmd-alt-ctrl-shift-p = 'workspace P'       # Personal/chat
    cmd-alt-ctrl-shift-y = 'workspace Y'       # YouTube/música
    cmd-alt-ctrl-shift-n = 'workspace N'       # Navegador/archivos

    # ─── WORKSPACE: Mover ventana (Meh + letra) ───────────────────
    alt-ctrl-shift-u = 'move-node-to-workspace U'
    alt-ctrl-shift-i = 'move-node-to-workspace I'
    alt-ctrl-shift-o = 'move-node-to-workspace O'
    alt-ctrl-shift-p = 'move-node-to-workspace P'
    alt-ctrl-shift-y = 'move-node-to-workspace Y'
    alt-ctrl-shift-n = 'move-node-to-workspace N'

    # ─── FOCO: Navegar entre ventanas (Hyper + H/J/K/L) ─────────────
    cmd-alt-ctrl-shift-h = 'focus left'
    cmd-alt-ctrl-shift-j = 'focus down'
    cmd-alt-ctrl-shift-k = 'focus up'
    cmd-alt-ctrl-shift-l = 'focus right'

    # ─── MOVER: Reposicionar ventana (Meh + H/J/K/L) ──────────────
    alt-ctrl-shift-h = 'move left'
    alt-ctrl-shift-j = 'move down'
    alt-ctrl-shift-k = 'move up'
    alt-ctrl-shift-l = 'move right'

    # ─── UTILIDADES ────────────────────────────────────────────────
    cmd-alt-ctrl-shift-tab = 'workspace-back-and-forth'    # Volver al workspace anterior
    cmd-alt-ctrl-shift-f = 'fullscreen'                    # Toggle fullscreen
    cmd-alt-ctrl-shift-a = 'layout tiles accordion'         # Toggle accordion

    # ─── Modo Servicio (Meh + ;) ──────────────────────────────────
    alt-ctrl-shift-semicolon = ['mode service', 'exec-and-forget /usr/local/bin/sketchybar --set aerospace_mode drawing=on']

# ═════════════════════════════════════════════════════════════════════
# Modo Servicio — Mantenimiento rápido
# ═════════════════════════════════════════════════════════════════════
[mode.service.binding]
    esc = ['reload-config', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --set aerospace_mode drawing=off']
    enter = ['mode main', 'exec-and-forget /usr/local/bin/sketchybar --set aerospace_mode drawing=off']
    r = ['flatten-workspace-tree', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --set aerospace_mode drawing=off']
    f = ['layout floating tiling', 'mode main', 'exec-and-forget /usr/local/bin/sketchybar --set aerospace_mode drawing=off']

# ═════════════════════════════════════════════════════════════════════
# Reglas de ruteo de ventanas (App routing)
# ═════════════════════════════════════════════════════════════════════

# ─── U: Universe / trabajo activo ───────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.openai.codex'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.apple.Terminal'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'dev.kiro.desktop'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.google.antigravity'
run = 'move-node-to-workspace U'

[[on-window-detected]]
if.app-id = 'com.google.antigravity-ide'
run = 'move-node-to-workspace U'

# ─── I: Internet / navegadores ──────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefoxdeveloperedition'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'org.qutebrowser.qutebrowser'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace I'

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = 'move-node-to-workspace I'

# ─── O: Organize / notas y escritura ────────────────────────────────
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace O'

[[on-window-detected]]
if.app-id = 'abnerworks.Typora'
run = 'move-node-to-workspace O'

# ─── P: People / comunicación ───────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.tdesktop.Telegram'
run = 'move-node-to-workspace P'

# ─── Y: Yield / media y descanso activo ─────────────────────────────
[[on-window-detected]]
if.app-id = 'com.github.th-ch.youtube-music'
run = 'move-node-to-workspace Y'

[[on-window-detected]]
if.app-id = 'org.videolan.vlc'
run = 'move-node-to-workspace Y'

# ─── N: Navigate / archivos y sistema ───────────────────────────────
# Mandar Finder siempre al workspace N (Navigate)
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace N'
