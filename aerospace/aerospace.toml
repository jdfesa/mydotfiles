# ╔═══════════════════════════════════════════════════════════════════════╗
# ║                    AeroSpace — Fase 1: Navegación                    ║
# ║                                                                      ║
# ║  Modificadores:                                                      ║
# ║    Alt            → Navegación (ir a workspace, foco)                ║
# ║    Meh (hold key) → Acción (mover ventana)                           ║
# ║                                                                      ║
# ║  Workspaces por LETRAS (mano derecha, sin fila numérica)             ║
# ║  Alt = meñique izquierdo | Letra = mano derecha                      ║
# ╚═══════════════════════════════════════════════════════════════════════╝

config-version = 2
start-at-login = true

# ─── Normalización ─────────────────────────────────────────────────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─── Layout por defecto ────────────────────────────────────────────────
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ─── Mouse sigue al foco cuando cambiás de monitor ────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ─── Workspaces persistentes (por letra, mnemotécnicos) ──────────────
# U = Uno (principal, IDE/editor)
# I = Internet (Chrome, browsers)
# O = Obsidian (notas, estudio)
# P = Personal (Telegram, Discord, chat)
# Y = YouTube/música (Spotify, media)
# N = Navegador de archivos (Finder, sistema)
persistent-workspaces = ["U", "I", "O", "P", "Y", "N"]

# ─── Gaps ─────────────────────────────────────────────────────────────
[gaps]
    inner.horizontal = 0
    inner.vertical   = 0
    outer.left       = 0
    outer.bottom     = 0
    outer.right      = 0
    outer.top        = 48  # Espacio para Sketchybar

# ─── Teclado QWERTY ─────────────────────────────────────────────────
[key-mapping]
    preset = 'qwerty'

# ═════════════════════════════════════════════════════════════════════
# ATAJOS — Modo Principal (main)
# ═════════════════════════════════════════════════════════════════════
#
# LÓGICA:
#   Alt + letra   → IR al workspace (navegación)
#   Meh + letra   → MOVER ventana al workspace (acción)
#
# Todas las letras de workspace están en la MANO DERECHA:
#   Y  U  I  O  P      ← fila superior (cómoda, no es la numérica)
#            N          ← fila inferior
#
# ═════════════════════════════════════════════════════════════════════
[mode.main.binding]

    # ─── WORKSPACE: Ir (Alt + letra) ───────────────────────────────
    alt-u = 'workspace U'       # Uno (principal)
    alt-i = 'workspace I'       # Internet
    alt-o = 'workspace O'       # Obsidian/notas
    alt-p = 'workspace P'       # Personal/chat
    alt-y = 'workspace Y'       # YouTube/música
    alt-n = 'workspace N'       # Navegador/archivos

    # ─── WORKSPACE: Mover ventana (Meh + letra) ───────────────────
    alt-ctrl-shift-u = 'move-node-to-workspace U'
    alt-ctrl-shift-i = 'move-node-to-workspace I'
    alt-ctrl-shift-o = 'move-node-to-workspace O'
    alt-ctrl-shift-p = 'move-node-to-workspace P'
    alt-ctrl-shift-y = 'move-node-to-workspace Y'
    alt-ctrl-shift-n = 'move-node-to-workspace N'

    # ─── FOCO: Navegar entre ventanas (Alt + H/J/K/L) ─────────────
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # ─── MOVER: Reposicionar ventana (Meh + H/J/K/L) ──────────────
    alt-ctrl-shift-h = 'move left'
    alt-ctrl-shift-j = 'move down'
    alt-ctrl-shift-k = 'move up'
    alt-ctrl-shift-l = 'move right'

    # ─── UTILIDADES ────────────────────────────────────────────────
    alt-tab = 'workspace-back-and-forth'    # Volver al workspace anterior
    alt-f = 'fullscreen'                     # Toggle fullscreen

    # ─── Modo Servicio (Meh + ;) ──────────────────────────────────
    alt-ctrl-shift-semicolon = 'mode service'

# ═════════════════════════════════════════════════════════════════════
# Modo Servicio — Mantenimiento rápido
# ═════════════════════════════════════════════════════════════════════
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    enter = 'mode main'
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
