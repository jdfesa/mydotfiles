# ╔═══════════════════════════════════════════════════════════════════════╗
# ║                    AeroSpace — Fase 1: Navegación                    ║
# ║                                                                      ║
# ║  Config mínima y funcional. Solo lo esencial para organizar          ║
# ║  ventanas en workspaces con atajos simples.                          ║
# ║                                                                      ║
# ║  Modificador base: Alt (LAlt en Silakka54, fila superior izquierda)  ║
# ║  Documentación: aerospace/README.md                                  ║
# ╚═══════════════════════════════════════════════════════════════════════╝

config-version = 2
start-at-login = true

# ─── Normalización (recomendado por la documentación oficial) ───────────
# Mantiene el árbol de ventanas simple y predecible.
# flatten: evita contenedores con un solo hijo (innecesarios).
# opposite-orientation: fuerza orientaciones alternadas al anidar.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─── Layout por defecto ────────────────────────────────────────────────
# tiles = las ventanas comparten el espacio visible (mosaico).
# auto  = horizontal si el monitor es ancho, vertical si es alto.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ─── Mouse sigue al foco cuando cambiás de monitor ────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ─── Workspaces persistentes ──────────────────────────────────────────
# CLAVE: Estos workspaces SIEMPRE existen, aunque estén vacíos.
# Sin esto, solo ves el workspace que tiene ventanas.
persistent-workspaces = ["1", "2", "3", "4", "5"]

# ─── Gaps (espacios) ─────────────────────────────────────────────────
[gaps]
    inner.horizontal = 0
    inner.vertical   = 0
    outer.left       = 0
    outer.bottom     = 0
    outer.right      = 0
    # Espacio reservado para Sketchybar (barra superior)
    outer.top        = 48

# ─── Teclado QWERTY ─────────────────────────────────────────────────
[key-mapping]
    preset = 'qwerty'

# ═════════════════════════════════════════════════════════════════════
# ATAJOS — Modo Principal (main)
# ═════════════════════════════════════════════════════════════════════
#
# FILOSOFÍA DE MODIFICADORES:
#   Alt + tecla         → Navegación (mirar, ir a workspace)
#   Alt + Shift + tecla → Acción (mover ventana, mover a workspace)
#
# ═════════════════════════════════════════════════════════════════════
[mode.main.binding]

    # ─── Cambiar de Workspace (Alt + número) ────────────────────────
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'

    # ─── Mover ventana a Workspace (Alt + Shift + número) ───────────
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'

    # ─── Navegar entre ventanas (Alt + H/J/K/L) ────────────────────
    # Estilo Vim: H=izq, J=abajo, K=arriba, L=derecha
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # ─── Mover ventana de posición (Alt + Shift + H/J/K/L) ─────────
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # ─── Volver al workspace anterior (Alt + Tab) ───────────────────
    alt-tab = 'workspace-back-and-forth'

    # ─── Entrar al Modo Servicio (Alt + Shift + ;) ──────────────────
    alt-shift-semicolon = 'mode service'

# ═════════════════════════════════════════════════════════════════════
# Modo Servicio — Mantenimiento rápido
# ═════════════════════════════════════════════════════════════════════
# Se activa con: Alt + Shift + ;
# Se sale con:   Esc (recarga config) o Enter (vuelve sin recargar)
# ═════════════════════════════════════════════════════════════════════
[mode.service.binding]
    # Recargar configuración y volver al modo main
    esc = ['reload-config', 'mode main']
    # Volver sin recargar
    enter = 'mode main'
    # Resetear layout (aplanar árbol si las ventanas se ven raras)
    r = ['flatten-workspace-tree', 'mode main']
    # Toggle floating/tiling (si una ventana está flotando y la querés tilear)
    f = ['layout floating tiling', 'mode main']
