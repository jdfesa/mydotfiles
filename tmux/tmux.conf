# Base tmux config for ~/mydotfiles.
# This is intentionally smaller than tmux.conf.sh, which is kept as upstream reference.

set -g prefix C-b

# Terminal compatibility
set -sg terminal-overrides ",*:RGB"
set -g default-terminal "${TERM}"
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

# Usability
set -g mode-keys vi
set-option -g history-limit 10000
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mouse on
set -s set-clipboard on
set-option -sg escape-time 100
set -g status-position top

# Pane borders
set -g pane-border-lines double
set -g pane-border-indicators both

# Splits
unbind '|'
bind '|' split-window -h
unbind '-'
bind '-' split-window -v

# Layout helpers
unbind J
unbind K
unbind C-j
unbind C-k
bind J select-layout even-horizontal
bind K select-layout even-vertical
bind C-j select-layout main-horizontal
bind C-k select-layout main-vertical
bind M-l run-shell "~/mydotfiles/tmux/layouts/7030/apply_layout.sh"
bind M-L run-shell "~/mydotfiles/tmux/layouts/2x3/apply_layout.sh"

# Sessions
unbind Space
bind Space switch-client -l
bind s choose-tree -Zs -O time -F "#{session_windows}"
bind M-s display-popup -E -w 75% -h 75% "tmux list-sessions -F '#{?session_attached,,#{session_name}}' | sed '/^$/d' | fzf --reverse --header jump-to-session --preview 'tmux capture-pane -pt {}' | xargs tmux switch-client -t"
bind M-S display-popup -E "tmux list-sessions -F '#{?session_attached,,#{session_name}}' | fzf --reverse -m --header=kill-session | xargs -I {} tmux kill-session -t {}"

# Optional sesh integration. Requires: brew install sesh fzf fd
if-shell 'command -v sesh >/dev/null 2>&1' {
  bind T display-popup -E -w 80% -h 70% "sesh connect \"$(sesh list --icons | fzf --no-sort --ansi --prompt 'session > ' --preview 'sesh preview {}')\""
}

# Copy mode
unbind v
bind v copy-mode
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Pane sync
unbind Q
bind Q setw synchronize-panes

# Previous window and zoom
unbind m
bind m previous-window
unbind M
bind -r M resize-pane -Z

# Resize
bind -r Left resize-pane -L 1
bind -r Down resize-pane -D 1
bind -r Up resize-pane -U 1
bind -r Right resize-pane -R 1
