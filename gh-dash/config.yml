# yaml-language-server: $schema=https://gh-dash.dev/schema.json

prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

notificationsSections:
  - title: Unread
    filters: is:unread
  - title: Review Requested
    filters: reason:review-requested
  - title: Mentioned
    filters: reason:mention
  - title: Participating
    filters: reason:participating
  - title: Assigned
    filters: reason:assign
  - title: All
    filters: ""

repoPaths:
  jdfesa/mydotfiles: ~/mydotfiles

repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60

defaults:
  preview:
    open: true
    width: 70
  prsLimit: 20
  issuesLimit: 20
  notificationsLimit: 30
  refetchIntervalMinutes: 30
  view: prs
  layout:
    prs:
      repo:
        width: 22
      author:
        width: 14
      authorIcon:
        hidden: false
      assignees:
        hidden: true
      base:
        hidden: true
      lines:
        width: 12
    issues:
      repo:
        width: 22
      creator:
        width: 14
      creatorIcon:
        hidden: false
      assignees:
        hidden: true

keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}} && lazygit

theme:
  colors:
    text:
      primary: "#F7F1FF"
      secondary: "#5AD4E6"
      inverted: "#0D0F18"
      faint: "#7A7F9A"
      warning: "#F6C177"
      success: "#7BD88F"
    background:
      selected: "#34394F"
    border:
      primary: "#8AADF4"
      secondary: "#7BD88F"
      faint: "#3E4057"
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true

confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
