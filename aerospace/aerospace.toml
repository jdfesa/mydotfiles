# ╔═══════════════════════════════════════════════════════════════════════╗
# ║                    AeroSpace — Fase 1: Navegación                    ║
# ║                                                                      ║
# ║  Modificadores:                                                      ║
# ║    Alt            → Navegación (mirar, ir a workspace)               ║
# ║    Meh (hold key) → Acción (mover ventana, enviar a workspace)       ║
# ║                                                                      ║
# ║  Meh = Ctrl+Alt+Shift = UNA sola tecla en el Silakka54              ║
# ║  Documentación: aerospace/README.md                                  ║
# ╚═══════════════════════════════════════════════════════════════════════╝

config-version = 2
start-at-login = true

# ─── Normalización (recomendado por la documentación oficial) ───────────
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─── Layout por defecto ────────────────────────────────────────────────
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# ─── Mouse sigue al foco cuando cambiás de monitor ────────────────────
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ─── Workspaces persistentes (0-9) ───────────────────────────────────
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]

# ─── Gaps (espacios) ─────────────────────────────────────────────────
[gaps]
    inner.horizontal = 0
    inner.vertical   = 0
    outer.left       = 0
    outer.bottom     = 0
    outer.right      = 0
    outer.top        = 48  # Espacio para Sketchybar

# ─── Teclado QWERTY ─────────────────────────────────────────────────
[key-mapping]
    preset = 'qwerty'

# ═════════════════════════════════════════════════════════════════════
# ATAJOS — Modo Principal (main)
# ═════════════════════════════════════════════════════════════════════
#
# FILOSOFÍA:
#   Alt + tecla → NAVEGACIÓN (mirar, ir)     — modificador ligero
#   Meh + tecla → ACCIÓN (mover, enviar)     — una sola tecla hold
#
# Meh en el Silakka54 = tecla hold derecha de la home row
# En aerospace.toml se escribe como: alt-ctrl-shift
#
# ═════════════════════════════════════════════════════════════════════
[mode.main.binding]

    # ─── NAVEGACIÓN: Cambiar de Workspace (Alt + número) ────────────
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-0 = 'workspace 0'

    # ─── ACCIÓN: Mover ventana a Workspace (Meh + número) ──────────
    alt-ctrl-shift-1 = 'move-node-to-workspace 1'
    alt-ctrl-shift-2 = 'move-node-to-workspace 2'
    alt-ctrl-shift-3 = 'move-node-to-workspace 3'
    alt-ctrl-shift-4 = 'move-node-to-workspace 4'
    alt-ctrl-shift-5 = 'move-node-to-workspace 5'
    alt-ctrl-shift-6 = 'move-node-to-workspace 6'
    alt-ctrl-shift-7 = 'move-node-to-workspace 7'
    alt-ctrl-shift-8 = 'move-node-to-workspace 8'
    alt-ctrl-shift-9 = 'move-node-to-workspace 9'
    alt-ctrl-shift-0 = 'move-node-to-workspace 0'

    # ─── NAVEGACIÓN: Foco entre ventanas (Alt + H/J/K/L) ───────────
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # ─── ACCIÓN: Mover ventana de posición (Meh + H/J/K/L) ─────────
    alt-ctrl-shift-h = 'move left'
    alt-ctrl-shift-j = 'move down'
    alt-ctrl-shift-k = 'move up'
    alt-ctrl-shift-l = 'move right'

    # ─── NAVEGACIÓN: Volver al workspace anterior ───────────────────
    alt-tab = 'workspace-back-and-forth'

    # ─── ACCIÓN: Fullscreen (Alt + F) ──────────────────────────────
    # Hace que la ventana actual ocupe TODO el workspace.
    # Las demás ventanas del workspace siguen ahí, pero ocultas.
    # Presionar de nuevo para volver al mosaico.
    alt-f = 'fullscreen'

    # ─── Modo Servicio (Meh + ;) ───────────────────────────────────
    alt-ctrl-shift-semicolon = 'mode service'

# ═════════════════════════════════════════════════════════════════════
# Modo Servicio — Mantenimiento rápido
# ═════════════════════════════════════════════════════════════════════
# Se activa con: Meh + ;
# Se sale con:   Esc (recarga config) o Enter (vuelve sin recargar)
# ═════════════════════════════════════════════════════════════════════
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    enter = 'mode main'
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
