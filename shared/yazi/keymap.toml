[mgr]

prepend_keymap = [
  { on = "<Esc>", run = "quit", desc = "Exit Yazi" },
  { on = "q", run = "quit", desc = "Exit Yazi" },
  { on = "Q", run = "quit --no-cwd-file", desc = "Exit without writing cwd-file" },

  { on = "o", run = "create", desc = "Create a file or directory (end with / for directories)" },
  { on = "O", run = "open --interactive", desc = "Choose how to open selected files" },
  { on = "<Enter>", run = "open", desc = "Open selected files" },
  { on = "r", run = "rename --cursor=before_ext", desc = "Rename hovered file" },
  { on = ".", run = "hidden toggle", desc = "Toggle hidden files" },

  { on = [ "d", "d" ], run = "remove", desc = "Trash selected files" },
  { on = [ "D", "D" ], run = "remove --permanently", desc = "Permanently delete selected files" },
  { on = [ "y", "y" ], run = "yank", desc = "Yank selected files (copy)" },
  { on = [ "x", "x" ], run = "yank --cut", desc = "Yank selected files (cut)" },
  { on = "p", run = "paste", desc = "Paste yanked files" },
  { on = "P", run = "paste --force", desc = "Paste and overwrite if needed" },

  { on = [ "c", "c" ], run = "copy path", desc = "Copy absolute path" },
  { on = [ "c", "d" ], run = "copy dirname", desc = "Copy parent directory" },
  { on = [ "c", "f" ], run = "copy filename", desc = "Copy filename" },
  { on = [ "c", "n" ], run = "copy name_without_ext", desc = "Copy filename without extension" },

  { on = "s", run = "search fd", desc = "Search files by name with fd" },
  { on = "S", run = "search rg", desc = "Search file contents with ripgrep" },
  { on = "<C-s>", run = "search none", desc = "Cancel active search" },
  { on = "f", run = "filter --smart", desc = "Filter current directory" },

  { on = [ "m", "s" ], run = "linemode size", desc = "Show sizes in the file list" },
  { on = [ "m", "m" ], run = "linemode mtime", desc = "Show modification times" },
  { on = [ "m", "p" ], run = "linemode permissions", desc = "Show permissions" },
  { on = [ "m", "n" ], run = "linemode none", desc = "Hide line metadata" },

  { on = [ ",", "a" ], run = "sort alphabetical --dir-first", desc = "Sort alphabetically" },
  { on = [ ",", "m" ], run = "sort modified --dir-first", desc = "Sort by modified time" },
  { on = [ ",", "s" ], run = "sort size --dir-first", desc = "Sort by size" },
  { on = [ ",", "n" ], run = "sort natural --dir-first", desc = "Sort naturally" },

  { on = [ "g", "h" ], run = "cd ~", desc = "Go to home" },
  { on = [ "g", "c" ], run = "cd ~/.config", desc = "Go to config" },
  { on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go to Downloads" },
  { on = [ "g", "r" ], run = "cd ~/mydotfiles", desc = "Go to mydotfiles" },
  { on = [ "g", "<Space>" ], run = "cd --interactive", desc = "Choose directory interactively" },

  { on = "t", run = "tab_create --current", desc = "Create a tab at the current path" },
  { on = "[", run = "tab_switch -1 --relative", desc = "Previous tab" },
  { on = "]", run = "tab_switch 1 --relative", desc = "Next tab" },
  { on = "1", run = "tab_switch 0", desc = "Switch to tab 1" },
  { on = "2", run = "tab_switch 1", desc = "Switch to tab 2" },
  { on = "3", run = "tab_switch 2", desc = "Switch to tab 3" },
  { on = "?", run = "help", desc = "Open help" },
]
